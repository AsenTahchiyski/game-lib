name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # needed to publish the rolling release

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Builds the frontend (npm run build) and the Tauri app for this OS.
      # No tagName => build-only (no release), which is what we want for CI.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: game-library-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: ignore

      # Clear old assets first so version-stamped bundles (e.g. a previous
      # 0.1.0) don't pile up under the rolling tag. Only the Ubuntu leg.
      - name: Clear stale release assets
        if: matrix.platform == 'ubuntu-22.04' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest-desktop --repo "$GITHUB_REPOSITORY" \
            --json assets -q '.assets[].name' 2>/dev/null \
          | while read -r name; do
              [ -n "$name" ] && gh release delete-asset latest-desktop "$name" \
                --repo "$GITHUB_REPOSITORY" -y || true
            done

      # Publish the Linux bundles to a rolling prerelease so they have a stable,
      # login-free, one-click download URL. Only the Ubuntu leg publishes.
      - name: Publish Linux bundles to latest-desktop release
        if: matrix.platform == 'ubuntu-22.04' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-desktop
          name: Latest Desktop (Linux)
          prerelease: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
